services:
  omniwatch:
    build:
      context: .
      target: production
    ports:
      - '3457:3457'
    volumes:
      - omniwatch-data:/data
    environment:
      - NODE_ENV=production
      - OMNI_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3457/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  omniwatch-data:
