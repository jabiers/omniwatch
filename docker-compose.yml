services:
  api:
    build:
      context: .
      target: api
    ports:
      - "3456:3456"
    volumes:
      - omniwatch-data:/data
    environment:
      - NODE_ENV=production
      - OMNI_DATA_DIR=/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "3457:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  omniwatch-data:
