version: 2

updates:
  # Root package.json
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # apps/cli
  - package-ecosystem: npm
    directory: /apps/cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # apps/daemon
  - package-ecosystem: npm
    directory: /apps/daemon
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # apps/api
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # apps/web
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # packages/shared
  - package-ecosystem: npm
    directory: /packages/shared
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # packages/db
  - package-ecosystem: npm
    directory: /packages/db
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - jabiers
